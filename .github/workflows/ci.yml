name: CI with Cache

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # REQUIRED cache step - works without any deps
    - name: prime-cache-0511cb9
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip  # Cache pip (Python) OR any folder
        key: cache-0511cb9  # Exact required key

    # Dummy step to test workflow
    - run: echo "Cache step succeeded!"
