name: CI with Cache

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Prime the cache step (as required)
    - name: prime-cache-0511cb9
      uses: actions/cache@v4
      with:
        path: ~/.npm  # Cache npm deps (change if using other langs)
        key: cache-0511cb9  # Exact key required

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'  # Optional auto-cache helper

    - run: npm ci  # Installs deps (fast if cache hits)
